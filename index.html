<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastercard UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="background">
   <div class="circle one"></div>
   <div class="circle two"></div>
   <div class="card-container">
    <div class="card">
  
  <div class="card-front">

    <div class="logo-row">
      <img src="logo.png" alt="logo" class="mastercard">
      <h3 class="title">MasterCard</h3>
    </div>

    <img src="chip.png" alt="chip" class="chip">

    <h6 class="label">Card Number</h6>

    <h3 class="number">0000 0000 0000 0000</h3>

    <h4 class="name">Palak Kapoor</h4>

    <div class="expiry-box">
      <h6 class="valid">Valid Thru</h6>
      <h4 class="expiry">08/28</h4>
    </div>

  </div>

  <div class="card-back">
      <p class="customer-text">
    For customer service call +977 4343 3433 or email at mastercard@gmail.com
  </p>

  <div class="mag-strip"></div>

  <div class="signature-area">
    <span class="cvv">005</span>
  </div>

  <p class="back-info">
    Lorem ipsum dolor sit amet consectetur, adipisicing elit.
    Nesciunt cumque fugit reiciendis.
  </p>
  </div>

</div>
</div>
</div>
</body>
</html>
